spring.data.mongodb.uri=mongodb://localhost:27017/gitcompare
spring.data.mongodb.database=gitcompare

# Security
gitcompare.jwt.secret=9a6747b45151ee6832dbf5567b5757d53b2e4d07d6d9e8b62c4516345e823528
gitcompare.jwt.expiration=86400000

# Git Storage
gitcompare.git.storage-path=./git-repos

# Logging
logging.level.com.gitcompare=DEBUG

# Gemini API
google.gemini.api.key=${GOOGLE_GEMINI_API_KEY:}

# Mail Configuration (for OTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
